<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}} — {{SITE_TITLE}}</title>
  <meta name="description" content="{{DESCRIPTION}}">
  <meta property="og:type" content="article">
  <meta property="og:title" content="{{TITLE}}">
  <meta property="og:description" content="{{DESCRIPTION}}">
  <meta property="og:site_name" content="{{SITE_TITLE}}">
  <link rel="icon" type="image/x-icon" href="/static/images/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/images/favicon-32.png">
  <link rel="icon" type="image/png" sizes="96x96" href="/static/images/favicon-96.png">
  <link rel="apple-touch-icon" sizes="256x256" href="/static/images/favicon-256.png">
  <link rel="alternate" type="application/rss+xml" title="{{SITE_TITLE}}" href="/feed.xml">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="shell">
    <div class="titlebar">
      <span class="brand"><b><a href="/">{{SITE_TITLE}}</a></b></span>
      <span class="brand"><b><a href="/consulting.html">Consulting</a></b></span>
    </div>

    <article>
      <header class="post-header">
        <a href="/" class="back">← All Posts</a>
        <h1>{{TITLE}}</h1>
        <div class="post-meta">
          <span>{{DATE}}</span>
        </div>
      </header>

      <div class="post-body">
        {{BODY}}
      </div>

      <div class="post-foot">
        {{PAGER}}
        <div class="colophon">
          <span><a href="/">© 2026 Everett Dutton</a></span>
        </div>
      </div>
    </article>
  </div>
</body>
</html>
